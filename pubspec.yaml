name: rescue_link
description: AI-powered offline mesh emergency app for GDG Solution Challenge 2026

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

# Enable Dart experiments
dart: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  cloud_functions: ^6.0.1
  
  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  
  # Gemini AI
  google_generative_ai: ^0.4.7
  
  # Utils
  permission_handler: ^12.0.1
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.3
  torch_light: ^1.1.0
  url_launcher: ^6.3.1
  uuid: ^4.5.0
  file_picker: ^8.1.2
  image_picker: ^1.2.1
  speech_to_text: ^7.3.0
  path_provider: ^2.1.5
  record: ^6.1.1
  audioplayers: ^6.1.0
  http: ^1.2.2
  
  # Nice UI extras (optional but recommended)
  fluttertoast: ^9.0.0
  haptic_feedback: 0.6.4+3   # for SOS vibration
  animated_bottom_navigation_bar: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/   # we'll create this folder later if needed